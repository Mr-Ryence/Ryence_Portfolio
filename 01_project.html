<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>first project</title>
     <style>
          * {
               margin: 0;
               padding: 0;
               box-sizing: border-box;
          }

          header {
               display: flex;
               justify-content: space-between;
               align-items: center;
               background-color: #f1f1f1;
               padding: 10px 20px;
               font-size: 24px;
               font-weight: bold;

          }

          .login {
               font-size: 18px;
               cursor: pointer;
          }

          .menubar ul {
               list-style: none;
               display: flex;
          }

          .menubar ul li {
               margin: 0 10px;
               cursor: pointer;
          }

          .menubar ul li:hover {
               color: blue;
          }
          .menubar ul li a {
               text-decoration: none;
               color: inherit;
          }
     </style>
</head>

<body>
     <header>
          <div class="logo">logo</div>
          <div class="menubar">
               <nav>
                    <ul>
                         <li>home</li>
                         <li>about</li>
                         <li>contact</li>
                         <li>services</li>
                         <li>project</li>
                    </ul>
               </nav>
          </div>
          <div>login</div>
     </header>
</body>

</html>
