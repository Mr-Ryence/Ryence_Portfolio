<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>first project</title>
     <style>
          * {
               margin: 0;
               padding: 0;
               box-sizing: border-box;
          }

          header {
               display: flex;
               justify-content: space-between;
               align-items: center;
               background-color: #413e3e;
               padding: 10px 20px;
               font-size: 24px;
               font-weight: bold;
               color: #fff;

          }

          .login {
               font-size: 18px;
               cursor: pointer;
          }

          .menubar ul {
               list-style: none;
               display: flex;
          }

          .menubar ul li {
               margin: 0 10px;
               cursor: pointer;
          }

          .menubar ul li:hover {
               color: blue;
          }

          .menubar ul li a {
               text-decoration: none;
               color: inherit;
          }

          .first {
               display: flex;
               flex-direction: column;
               align-items: center;
               justify-content: center;
               height: 100vh;
               text-align: center;
               background-color: #dfdddd;
          }

          footer {
               display: flex;
               justify-content: space-around;
               align-items: center;
               background-color: #413e3e;
               padding: 10px 20px;
               font-size: 18px;
               color: #fff;
               height: 40vh;
          }

          #footer_menu {
               display: flex;
               justify-content: center;
               align-items: center;
          }

          #footer_menu ul {
               list-style: none;
               display: flex;
               flex-direction: column;
          }

          #footer_menu ul li {
               margin: 5 10px;
               cursor: pointer;
          }
          #footer_menu ul li a {
               text-decoration: none;
               color: inherit;
          }
     </style>
</head>

<body>
     <header>
          <div class="logo">logo</div>
          <div class="menubar">
               <nav>
                    <ul>
                         <li>home</li>
                         <li>about</li>
                         <li>contact</li>
                         <li>services</li>
                         <li>project</li>
                    </ul>
               </nav>
          </div>
          <div>login</div>
     </header>
     <main>
          <section class="first">
               <h1>Welcome to my first project</h1>
               <p>This is a simple HTML page with a header and navigation menu.</p>
          </section>
     </main>
     <footer>
          <div>first </div>
          <div id="footer_menu">
               <ul>
                    <li>home</li>
                    <li>about</li>
                    <li>contact</li>
                    <li>services</li>
                    <li>project</li>
               </ul>
          </div>
          <div>third </div>
          <div>fourth </div>
     </footer>
</body>

</html>
